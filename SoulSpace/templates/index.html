<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoulSpace — Seren Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <style>
      :root { --background: 201 100% 13%; --foreground: 0 0% 100%; --muted-foreground: 240 4% 66%; --border: 0 0% 18%; --input: 0 0% 18%; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      .liquid-glass { background: rgba(255,255,255,0.01); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
      .liquid-glass::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1.4px; background: linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%); -webkit-mask: linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
      @keyframes fade-rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
      .animate-fade-rise       { animation: fade-rise 0.8s ease-out both; }
      .animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.2s both; }
      *::-webkit-scrollbar { width: 4px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 9999px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useRef, useEffect } = React;

      /* ── Flask history injected server-side ── */
      const FLASK_HISTORY = {{ history | tojson | safe }};

      function SerenBackground() {
        const canvasRef = useRef(null);
        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          let animId, time = 0;
          const layers = [
            { centerY: 0.3, amplitude: 28, frequency: 0.012, speed: 0.008, opacity: 0.07 },
            { centerY: 0.45, amplitude: 18, frequency: 0.018, speed: 0.012, opacity: 0.05 },
            { centerY: 0.55, amplitude: 36, frequency: 0.008, speed: 0.005, opacity: 0.04 },
            { centerY: 0.7,  amplitude: 12, frequency: 0.025, speed: 0.015, opacity: 0.06 },
          ];
          function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
          resize();
          window.addEventListener('resize', resize);
          function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width, h = canvas.height;
            const breath = 0.85 + 0.15 * Math.sin(time * 0.001);
            for (const layer of layers) {
              const cy = h * layer.centerY;
              const amp = layer.amplitude * breath;
              ctx.beginPath();
              for (let x = 0; x <= w; x += 2) {
                const y = cy + amp * Math.sin(layer.frequency * x + time * layer.speed * 1000);
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
              }
              ctx.strokeStyle = `rgba(255,255,255,${layer.opacity})`;
              ctx.lineWidth = 1.5;
              ctx.stroke();
            }
            time += 0.016;
            animId = requestAnimationFrame(draw);
          }
          draw();
          return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
        }, []);
        return React.createElement('canvas', { ref: canvasRef, className: 'absolute inset-0 w-full h-full z-0 pointer-events-none' });
      }

      function serenMessages() {
        const msgs = [];
        for (const m of FLASK_HISTORY) {
          if (m.role === 'system') continue;
          msgs.push({ id: Math.random().toString(), role: m.role === 'assistant' ? 'ai' : 'user', content: m.content });
        }
        return msgs;
      }

      function SerenChat() {
        const [messages, setMessages] = useState(serenMessages());
        const [input, setInput] = useState('');
        const [loading, setLoading] = useState(false);
        const chatEndRef = useRef(null);

        useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

        const handleSend = async () => {
          const text = input.trim();
          if (!text || loading) return;
          setMessages(prev => [...prev, { id: Date.now().toString(), role: 'user', content: text }]);
          setInput('');
          setLoading(true);
          const form = new FormData();
          form.append('prompt', text);
          try {
            const res = await fetch('/submit', { method: 'POST', body: form });
            const html = await res.text();
            /* Parse reply from returned page – Flask renders full page */
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const newHistory = JSON.parse(doc.getElementById('flask-history')?.textContent || '[]');
            const msgs = [];
            for (const m of newHistory) {
              if (m.role === 'system') continue;
              msgs.push({ id: Math.random().toString(), role: m.role === 'assistant' ? 'ai' : 'user', content: m.content });
            }
            setMessages(msgs);
          } catch(e) {
            setMessages(prev => [...prev, { id: Date.now().toString(), role: 'ai', content: 'Sorry, something went wrong. Please try again.' }]);
          }
          setLoading(false);
        };

        const handleKeyDown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };

        const handleNewChat = async () => {
          if (!window.confirm("Are you sure you want to clear the conversation history and start a new chat?")) return;
          try {
            await fetch('/clear_history', { method: 'POST' });
            setMessages([]);
          } catch(e) {
            console.error("Failed to clear chat history", e);
          }
        };

        return (
          <div className="relative min-h-screen bg-[hsl(var(--background))] flex flex-col overflow-hidden">
            <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover z-0 opacity-40 pointer-events-none">
              <source src="/static/videos/homepage.mp4" type="video/mp4" />
            </video>
            {React.createElement(SerenBackground)}
            <nav className="relative z-10 w-full">
              <div className="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
                <a href="/homepage" className="text-3xl tracking-tight no-underline text-white" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  SoulSpace <span className="text-xs align-super">✦</span>
                </a>
                <div className="hidden md:flex items-center gap-8">
                  <a href="/homepage" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Home</a>
                  <a href="/" className="text-sm text-white no-underline">Seren</a>
                  <a href="/mbti" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Assessments</a>
                  <a href="/logout" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Logout</a>
                </div>
                <a href="/" className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform no-underline">
                  Talk to Seren
                </a>
              </div>
            </nav>

            <div className="max-w-3xl mx-auto w-full px-6 pt-10 pb-4 relative z-10 flex justify-between items-end">
              <div>
                <h2 className="animate-fade-rise text-3xl font-normal" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  Seren <span className="text-xs align-super">✦</span>
                </h2>
                <p className="animate-fade-rise-delay text-muted-foreground text-sm mt-1">Your AI mental wellness companion. Ask, reflect, or just talk.</p>
              </div>
              <button onClick={handleNewChat} className="liquid-glass rounded-full px-4 py-2 text-xs text-white hover:scale-[1.03] transition-transform cursor-pointer flex items-center gap-1.5 animate-fade-rise">
                <span>⟳</span> New Chat
              </button>
            </div>

            <div className="flex-1 overflow-y-auto px-6 pb-6 max-w-3xl mx-auto w-full flex flex-col gap-4 relative z-10">
              {messages.length === 0 && (
                <p className="text-muted-foreground text-sm text-center mt-10">Say hello to Seren 👋</p>
              )}
              {messages.map(msg => (
                <div key={msg.id} className={`animate-fade-rise flex flex-col w-full ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                  {msg.role === 'ai' && (
                    <span className="text-xs text-muted-foreground mb-1 ml-1" style={ { fontFamily: "'Instrument Serif', serif" } }>Seren ✦</span>
                  )}
                  <div className={msg.role === 'ai'
                    ? 'liquid-glass rounded-2xl rounded-tl-sm px-5 py-4 text-sm text-white max-w-[80%] self-start'
                    : 'bg-white/5 border border-white/10 rounded-2xl rounded-tr-sm px-5 py-4 text-sm text-white max-w-[80%] self-end'}>
                    {msg.content}
                  </div>
                </div>
              ))}
              {loading && (
                <div className="flex items-start">
                  <span className="text-xs text-muted-foreground mb-1 ml-1" style={ { fontFamily: "'Instrument Serif', serif" } }>Seren ✦</span>
                  <div className="liquid-glass rounded-2xl rounded-tl-sm px-5 py-4 text-sm text-muted-foreground ml-1">Thinking…</div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            <div className="sticky bottom-0 bg-[hsl(var(--background))] border-t border-[hsl(var(--border))] px-6 py-4 z-10">
              <div className="max-w-3xl mx-auto w-full">
                <div className="liquid-glass rounded-2xl flex items-center gap-3 px-4 py-3">
                  <input
                    className="flex-1 bg-transparent text-sm text-white placeholder:text-muted-foreground focus:outline-none"
                    placeholder="Type something..."
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={handleKeyDown}
                  />
                  <button
                    className="liquid-glass rounded-xl px-4 py-2 text-xs text-white hover:scale-[1.03] transition-transform cursor-pointer shrink-0"
                    onClick={handleSend}>
                    {loading ? '…' : 'Send →'}
                  </button>
                </div>
                <div className="flex gap-3 mt-3 flex-wrap">
                  <a href="/mbti" className="liquid-glass rounded-full px-4 py-1.5 text-xs text-muted-foreground hover:text-white transition-colors no-underline">MBTI →</a>
                  <a href="/phq-9" className="liquid-glass rounded-full px-4 py-1.5 text-xs text-muted-foreground hover:text-white transition-colors no-underline">PHQ-9 →</a>
                  <a href="/gad-7" className="liquid-glass rounded-full px-4 py-1.5 text-xs text-muted-foreground hover:text-white transition-colors no-underline">GAD-7 →</a>
                  <a href="/homepage" className="liquid-glass rounded-full px-4 py-1.5 text-xs text-muted-foreground hover:text-white transition-colors no-underline">Dashboard →</a>
                </div>
                <p className="text-center text-[10px] text-muted-foreground/60 mt-4">
                  For urgent help, reach out to a trusted adult or local helpline immediately.
                </p>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SerenChat));
    </script>

    <!-- Flask history for JS to read -->
    <script id="flask-history" type="application/json">{{ history | tojson | safe }}</script>
  </body>
</html>
