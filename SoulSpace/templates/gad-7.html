<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoulSpace — GAD-7 Screening</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <style>
      :root { --background: 201 100% 13%; --foreground: 0 0% 100%; --muted-foreground: 240 4% 66%; --border: 0 0% 18%; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      .liquid-glass { background: rgba(255,255,255,0.01); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
      .liquid-glass::before { content:''; position:absolute; inset:0; border-radius:inherit; padding:1.4px; background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
      .aurora-bg { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
      .aurora-bg::before,.aurora-bg::after { content:''; position:absolute; width:140%; height:60%; border-radius:50%; filter:blur(80px); opacity:0.045; }
      .aurora-bg::before { background:radial-gradient(ellipse,rgba(100,140,255,1) 0%,transparent 70%); top:-10%; left:-20%; animation:aurora-drift 18s ease-in-out infinite alternate; }
      .aurora-bg::after  { background:radial-gradient(ellipse,rgba(180,160,255,1) 0%,transparent 70%); bottom:-10%; right:-20%; animation:aurora-drift 22s ease-in-out infinite alternate-reverse; }
      @keyframes aurora-drift { 0%{transform:translateX(0) translateY(0) scale(1)} 33%{transform:translateX(6%) translateY(3%) scale(1.04)} 66%{transform:translateX(-4%) translateY(-2%) scale(0.97)} 100%{transform:translateX(3%) translateY(5%) scale(1.02)} }
      @keyframes fade-rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
      .animate-fade-rise { animation:fade-rise 0.8s ease-out both; }
      *::-webkit-scrollbar { width:4px; } *::-webkit-scrollbar-track { background:transparent; } *::-webkit-scrollbar-thumb { background:hsl(var(--border)); border-radius:9999px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;

      const GAD7_QUESTIONS = [
        'Feeling nervous, anxious, or on edge.',
        'Not being able to stop or control worrying.',
        'Worrying too much about different things.',
        'Trouble relaxing.',
        "Being so restless that it's hard to sit still.",
        'Becoming easily annoyed or irritable.',
        'Feeling afraid, as if something awful might happen.',
      ];
      const GAD7_OPTIONS = [
        { label: 'Not at all', score: 0 },
        { label: 'Several days', score: 1 },
        { label: 'More than half the days', score: 2 },
        { label: 'Nearly every day', score: 3 },
      ];
      const GAD7_TIPS = {
        minimal: [
          { title: "Daily Mindfulness Practice", content: "Dedicate 5-10 minutes each day to mindful breathing or meditation. This helps maintain cognitive resilience and keeps baseline stress low." },
          { title: "Establish Healthy Routines", content: "Ensure consistent sleeping times, balanced nutrition, and regular breaks during work or study. A stable body supports a stable mind." },
          { title: "Regular Physical Activity", content: "Engage in moderate physical exercise like yoga, walking, or cycling. Exercise naturally releases endorphins and reduces stress hormones." }
        ],
        mild: [
          { title: "Box Breathing Exercise", content: "Try breathing in for 4 seconds, holding for 4, exhaling for 4, and holding for 4. Repeat this for 2-3 minutes whenever feeling tense." },
          { title: "Reduce Caffeine & Stimulants", content: "High caffeine intake can mimic or worsen physiological anxiety symptoms (jitteriness, rapid heart rate). Swap to herbal teas." },
          { title: "Daily Worry Journaling", content: "Dedicate 5-10 minutes to write down whatever is causing anxiety. Externalizing worries onto paper helps clear mental clutter." }
        ],
        moderate: [
          { title: "Cognitive Reframing Techniques", content: "Identify automatic negative thoughts (like catastrophizing) and challenge them by writing down objective evidence for and against them." },
          { title: "Progressive Muscle Relaxation (PMR)", content: "Tense a muscle group (e.g., shoulders) for 5 seconds, then release it completely. Repeat from your toes to your face to release body tension." },
          { title: "Structured Worry Time", content: "Designate a specific 15-minute block each day purely to address worries. If anxious thoughts occur outside this time, postpone them to your worry window." }
        ],
        severe: [
          { title: "Seek Professional Consultation", content: "Connect with a therapist, psychologist, or school counselor. Evidence-based therapies like CBT are highly effective for managing severe anxiety." },
          { title: "5-4-3-2-1 Grounding Method", content: "Observe your surroundings: Name 5 things you see, 4 you can touch, 3 you hear, 2 you smell, and 1 you taste. This pulls you out of anxious spirals." },
          { title: "Establish a Support Network", content: "Reach out to trusted friends, family, or contact local helplines. You don't have to navigate intense anxiety alone." }
        ]
      };

      function getResult(total) {
        if (total <= 4) return { key: 'minimal', label: 'Minimal anxiety', message: 'Your score suggests minimal anxiety symptoms.' };
        if (total <= 9) return { key: 'mild', label: 'Mild anxiety', message: 'Your score suggests mild anxiety symptoms.' };
        if (total <= 14) return { key: 'moderate', label: 'Moderate anxiety', message: 'Your score suggests moderate anxiety symptoms.' };
        return { key: 'severe', label: 'Severe anxiety', message: 'Your score suggests severe anxiety symptoms. Please consider speaking to a counselor.' };
      }

      function SoulSpaceGAD7() {
        const [current, setCurrent] = useState(0);
        const [answers, setAnswers] = useState(Array(7).fill(-1));
        const [showResults, setShowResults] = useState(false);
        const [openAccordion, setOpenAccordion] = useState(null);

        const total = answers.reduce((s, v) => s + (v >= 0 ? v : 0), 0);
        const result = getResult(total);

        const selectOption = score => { const next = [...answers]; next[current] = score; setAnswers(next); };
        const goNext = () => { if (current < 6) setCurrent(p => p + 1); else setShowResults(true); };
        const goPrev = () => { if (current > 0) setCurrent(p => p - 1); };
        const handleRetake = () => { setCurrent(0); setAnswers(Array(7).fill(-1)); setShowResults(false); setOpenAccordion(null); };

        const handleSubmit = () => {
          const form = document.createElement('form');
          form.method = 'POST';
          form.action = '/submit_gad7';
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = 'answers';
          input.value = JSON.stringify(answers);
          form.appendChild(input);
          document.body.appendChild(form);
          form.submit();
        };

        return (
          <div className="relative min-h-screen bg-[hsl(var(--background))] flex flex-col overflow-hidden">
            <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover z-0 opacity-40 pointer-events-none">
              <source src="/static/videos/gad-7.mp4" type="video/mp4" />
            </video>
            <div className="aurora-bg" />
            <nav className="relative z-10 w-full">
              <div className="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
                <a href="/homepage" className="text-3xl tracking-tight no-underline text-white" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  SoulSpace <span className="text-xs align-super">✦</span>
                </a>
                <div className="hidden md:flex items-center gap-8">
                  <a href="/homepage" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Home</a>
                  <a href="/" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Seren</a>
                  <a href="/mbti" className="text-sm text-white no-underline">Assessments</a>
                  <a href="/logout" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Logout</a>
                </div>
                <a href="/" className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform no-underline">Talk to Seren</a>
              </div>
            </nav>

            {!showResults ? (
              <div className="flex-1 max-w-2xl mx-auto px-6 py-20 w-full relative z-10">
                <div className="h-[2px] bg-white/10 rounded mb-2">
                  <div className="h-full bg-white/50 rounded transition-all duration-500" style={ { width: `${((current + 1) / 7) * 100}%` } } />
                </div>
                <p className="text-xs text-muted-foreground mb-8">{current + 1} of 7</p>
                <span className="liquid-glass rounded-full px-4 py-1 text-xs text-muted-foreground mb-6 inline-block">GAD-7 Anxiety Screening</span>
                <h2 className="animate-fade-rise text-2xl sm:text-3xl font-normal mt-2 mb-8" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  {GAD7_QUESTIONS[current]}
                </h2>
                <div className="flex flex-col gap-3">
                  {GAD7_OPTIONS.map(opt => (
                    <button key={opt.score} onClick={() => selectOption(opt.score)}
                      className={`liquid-glass rounded-xl px-6 py-4 text-sm text-white cursor-pointer text-left transition-all hover:bg-white/5 ${answers[current] === opt.score ? 'border border-white/30 bg-white/5' : ''}`}>
                      {opt.label}
                    </button>
                  ))}
                </div>
                <div className="flex justify-between mt-10">
                  <button onClick={goPrev} className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all cursor-pointer">← Previous</button>
                  <button onClick={goNext} disabled={answers[current] === -1} className="liquid-glass rounded-full px-8 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform cursor-pointer disabled:opacity-40 disabled:pointer-events-none">
                    {current < 6 ? 'Next →' : 'See Results →'}
                  </button>
                </div>
              </div>
            ) : (
              <div className="flex-1 flex items-center justify-center px-6 py-20 relative z-10">
                <div className="liquid-glass rounded-2xl p-10 text-center max-w-xl w-full animate-fade-rise">
                  <span className="liquid-glass rounded-full px-6 py-2 text-2xl font-medium mb-4 inline-block">{total}</span>
                  <h2 className="text-3xl font-normal mb-4" style={ { fontFamily: "'Instrument Serif', serif" } }>{result.label}</h2>
                  <p className="text-muted-foreground text-sm leading-relaxed">{result.message}</p>
                  
                  {/* Tips Accordion */}
                  <div className="text-left mt-6 border-t border-white/10 pt-6">
                    <h4 className="text-sm font-semibold text-white mb-3">Self-Care Recommendations:</h4>
                    <div className="space-y-2">
                      {(GAD7_TIPS[result.key] || []).map((tip, idx) => {
                        const isOpen = openAccordion === idx;
                        return (
                          <div key={idx} className="liquid-glass rounded-xl border border-white/5 overflow-hidden transition-all duration-300">
                            <button
                              onClick={() => setOpenAccordion(isOpen ? null : idx)}
                              className="w-full flex items-center justify-between px-4 py-3 text-left text-xs sm:text-sm font-medium text-white hover:bg-white/5 transition-colors focus:outline-none"
                            >
                              <span>{tip.title}</span>
                              <span className="text-muted-foreground">{isOpen ? '−' : '+'}</span>
                            </button>
                            <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-40 border-t border-white/5' : 'max-h-0'}`}>
                              <p className="p-4 text-xs text-muted-foreground leading-relaxed">
                                {tip.content}
                              </p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <p className="text-xs text-muted-foreground mt-6">This is not a clinical diagnosis. Please consult a mental health professional for proper evaluation.</p>
                  <div className="flex gap-4 justify-center mt-8 flex-wrap">
                    <button onClick={handleSubmit} className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform cursor-pointer">
                      Submit & Chat with Seren →
                    </button>
                    <button onClick={handleRetake} className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all cursor-pointer">
                      Retake Test
                    </button>
                    <a href="/homepage" className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all no-underline">
                      Back to Dashboard
                    </a>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SoulSpaceGAD7));
    </script>
  </body>
</html>
