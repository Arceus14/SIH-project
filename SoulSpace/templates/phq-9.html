<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoulSpace — PHQ-9 Screening</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <style>
      :root { --background: 201 100% 13%; --foreground: 0 0% 100%; --muted-foreground: 240 4% 66%; --border: 0 0% 18%; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      .liquid-glass { background: rgba(255,255,255,0.01); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
      .liquid-glass::before { content:''; position:absolute; inset:0; border-radius:inherit; padding:1.4px; background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
      @keyframes fade-rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
      .animate-fade-rise { animation:fade-rise 0.8s ease-out both; }
      *::-webkit-scrollbar { width:4px; } *::-webkit-scrollbar-track { background:transparent; } *::-webkit-scrollbar-thumb { background:hsl(var(--border)); border-radius:9999px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      function PHQ9Background() {
        const canvasRef = useRef(null);
        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          let animId, spawnTimer = 0, ripples = [];
          function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
          function spawnRipple() { if (ripples.length >= 6) return; ripples.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: 0, maxRadius: 180+Math.random()*100, speed: 0.4+Math.random()*0.3, opacity: 0.12 }); }
          function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width/2, cy = canvas.height/2;
            ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 1;
            for (const r of [canvas.height*0.2, canvas.height*0.4]) { ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke(); }
            spawnTimer += 16;
            if (spawnTimer >= 2200) { spawnTimer = 0; spawnRipple(); }
            for (let i = ripples.length-1; i >= 0; i--) {
              const rip = ripples[i]; rip.radius += rip.speed;
              const alpha = rip.opacity * (1 - rip.radius/rip.maxRadius);
              if (rip.radius >= rip.maxRadius || alpha <= 0) { ripples.splice(i,1); continue; }
              ctx.beginPath(); ctx.arc(rip.x,rip.y,rip.radius,0,Math.PI*2); ctx.strokeStyle=`rgba(255,255,255,${alpha})`; ctx.lineWidth=1; ctx.stroke();
            }
            animId = requestAnimationFrame(draw);
          }
          resize(); draw(); window.addEventListener('resize', resize);
          return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
        }, []);
        return React.createElement('canvas', { ref: canvasRef, className: 'absolute inset-0 w-full h-full z-0 pointer-events-none' });
      }

      const PHQ9_QUESTIONS = [
        'Little interest or pleasure in doing things.',
        'Feeling down, depressed, or hopeless.',
        'Trouble falling or staying asleep, or sleeping too much.',
        'Feeling tired or having little energy.',
        'Poor appetite or overeating.',
        'Feeling bad about yourself — or that you are a failure.',
        'Trouble concentrating on things, such as reading or watching television.',
        'Moving or speaking so slowly that other people could have noticed.',
        'Thoughts that you would be better off dead, or of hurting yourself.',
      ];
      const PHQ9_OPTIONS = [
        { label: 'Not at all', score: 0 },
        { label: 'Several days', score: 1 },
        { label: 'More than half the days', score: 2 },
        { label: 'Nearly every day', score: 3 },
      ];
      const PHQ9_TIPS = {
        minimal: [
          { title: "Daily Gratitude Practice", content: "Write down 3 things you are grateful for each day. Focusing on small positive details helps build emotional resilience and positive neural pathways." },
          { title: "Stay Socially Connected", content: "Make a habit of reaching out to a friend, colleague, or family member daily. Meaningful conversations stimulate positive brain chemistry." },
          { title: "Consistent Sleep Hygiene", content: "Maintain a stable sleep schedule (going to bed and waking up at the same time). Quality sleep is one of the pillars of mood stability." }
        ],
        mild: [
          { title: "Behavioral Activation", content: "Schedule one small, low-stress activity today that either gives you a sense of achievement (like organizing a drawer) or pleasure (like reading a chapter)." },
          { title: "Light Physical Exercise", content: "Take a 10-15 minute walk outside. Regular exposure to daylight and movement helps elevate serotonin levels and gently boosts energy." },
          { title: "Practice Self-Compassion", content: "Avoid self-criticism. When feeling down, talk to yourself with the same gentle kindness and patience you would offer to a close friend." }
        ],
        moderate: [
          { title: "Establish a Visual Routine", content: "Create a simple, structured daily schedule with clear blocks for rest, meals, and tasks. Having a routine reduces the cognitive load of decision-making." },
          { title: "Counteract Social Withdrawal", content: "Even when feeling unmotivated, make a conscious effort to stay connected. Share how you're feeling with at least one supportive person." },
          { title: "Consult a Counselor or Doctor", content: "Consider sharing these results with a health professional or school counselor. Early therapy or guidance can prevent symptoms from compounding." }
        ],
        severe: [
          { title: "Professional Intervention", content: "It is highly recommended to seek professional help from a therapist, psychologist, or psychiatrist for structured clinical support." },
          { title: "Create a Coping Safety Plan", content: "Write down your personal warning signs of low mood, 3 coping strategies that soothe you, and contacts of people or helplines you can call." },
          { title: "Reach Out to Crisis Resources", content: "If you feel overwhelmed, remember you are not alone. Reach out to local counseling centers, helpline services, or crisis chat lines immediately." }
        ]
      };

      function getResult(total) {
        if (total <= 4) return { key: 'minimal', label: 'Minimal or none', message: 'Your score suggests minimal depressive symptoms.' };
        if (total <= 9) return { key: 'mild', label: 'Mild', message: 'Your score suggests mild depressive symptoms.' };
        if (total <= 14) return { key: 'moderate', label: 'Moderate', message: 'Your score suggests moderate depressive symptoms.' };
        return { key: 'severe', label: 'Moderately severe / Severe', message: 'Your score suggests significant depressive symptoms. Please consider speaking to a counselor.' };
      }

      function SoulSpacePHQ9() {
        const [current, setCurrent] = useState(0);
        const [answers, setAnswers] = useState(Array(9).fill(-1));
        const [showResults, setShowResults] = useState(false);
        const [openAccordion, setOpenAccordion] = useState(null);

        const total = answers.reduce((s, v) => s + (v >= 0 ? v : 0), 0);
        const result = getResult(total);
        const selectOption = score => { const next = [...answers]; next[current] = score; setAnswers(next); };
        const goNext = () => { if (current < 8) setCurrent(p => p+1); else setShowResults(true); };
        const goPrev = () => { if (current > 0) setCurrent(p => p-1); };
        const handleRetake = () => { setCurrent(0); setAnswers(Array(9).fill(-1)); setShowResults(false); setOpenAccordion(null); };

        const handleSubmit = () => {
          const form = document.createElement('form');
          form.method = 'POST'; form.action = '/submit_phq9';
          const input = document.createElement('input');
          input.type = 'hidden'; input.name = 'answers'; input.value = JSON.stringify(answers);
          form.appendChild(input); document.body.appendChild(form); form.submit();
        };

        return (
          <div className="relative min-h-screen bg-[hsl(var(--background))] flex flex-col overflow-hidden">
            <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover z-0 opacity-40 pointer-events-none">
              <source src="/static/videos/phq-9.mp4" type="video/mp4" />
            </video>
            {React.createElement(PHQ9Background)}
            <nav className="relative z-10 w-full">
              <div className="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
                <a href="/homepage" className="text-3xl tracking-tight no-underline text-white" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  SoulSpace <span className="text-xs align-super">✦</span>
                </a>
                <div className="hidden md:flex items-center gap-8">
                  <a href="/homepage" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Home</a>
                  <a href="/" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Seren</a>
                  <a href="/mbti" className="text-sm text-white no-underline">Assessments</a>
                  <a href="/logout" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Logout</a>
                </div>
                <a href="/" className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform no-underline">Talk to Seren</a>
              </div>
            </nav>

            {!showResults ? (
              <div className="flex-1 max-w-2xl mx-auto px-6 py-20 w-full relative z-10">
                <div className="h-[2px] bg-white/10 rounded mb-2">
                  <div className="h-full bg-white/50 rounded transition-all duration-500" style={ { width: `${((current+1)/9)*100}%` } } />
                </div>
                <p className="text-xs text-muted-foreground mb-8">{current+1} of 9</p>
                <span className="liquid-glass rounded-full px-4 py-1 text-xs text-muted-foreground mb-6 inline-block">PHQ-9 Depression Screening</span>
                <h2 className="animate-fade-rise text-2xl sm:text-3xl font-normal mt-2 mb-8" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  {PHQ9_QUESTIONS[current]}
                </h2>
                <div className="flex flex-col gap-3">
                  {PHQ9_OPTIONS.map(opt => (
                    <button key={opt.score} onClick={() => selectOption(opt.score)}
                      className={`liquid-glass rounded-xl px-6 py-4 text-sm text-white cursor-pointer text-left transition-all hover:bg-white/5 ${answers[current] === opt.score ? 'border border-white/30 bg-white/5' : ''}`}>
                      {opt.label}
                    </button>
                  ))}
                </div>
                <div className="flex justify-between mt-10">
                  <button onClick={goPrev} className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all cursor-pointer">← Previous</button>
                  <button onClick={goNext} disabled={answers[current] === -1} className="liquid-glass rounded-full px-8 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform cursor-pointer disabled:opacity-40 disabled:pointer-events-none">
                    {current < 8 ? 'Next →' : 'See Results →'}
                  </button>
                </div>
              </div>
            ) : (
              <div className="flex-1 flex items-center justify-center px-6 py-20 relative z-10">
                <div className="liquid-glass rounded-2xl p-10 text-center max-w-xl w-full animate-fade-rise">
                  <span className="liquid-glass rounded-full px-6 py-2 text-2xl font-medium mb-4 inline-block">{total}</span>
                  <h2 className="text-3xl font-normal mb-4" style={ { fontFamily: "'Instrument Serif', serif" } }>{result.label}</h2>
                  <p className="text-muted-foreground text-sm leading-relaxed">{result.message}</p>
                  
                  {/* Tips Accordion */}
                  <div className="text-left mt-6 border-t border-white/10 pt-6">
                    <h4 className="text-sm font-semibold text-white mb-3">Self-Care Recommendations:</h4>
                    <div className="space-y-2">
                      {(PHQ9_TIPS[result.key] || []).map((tip, idx) => {
                        const isOpen = openAccordion === idx;
                        return (
                          <div key={idx} className="liquid-glass rounded-xl border border-white/5 overflow-hidden transition-all duration-300">
                            <button
                              onClick={() => setOpenAccordion(isOpen ? null : idx)}
                              className="w-full flex items-center justify-between px-4 py-3 text-left text-xs sm:text-sm font-medium text-white hover:bg-white/5 transition-colors focus:outline-none"
                            >
                              <span>{tip.title}</span>
                              <span className="text-muted-foreground">{isOpen ? '−' : '+'}</span>
                            </button>
                            <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isOpen ? 'max-h-40 border-t border-white/5' : 'max-h-0'}`}>
                              <p className="p-4 text-xs text-muted-foreground leading-relaxed">
                                {tip.content}
                              </p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <p className="text-xs text-muted-foreground mt-6">This is not a clinical diagnosis. Please consult a mental health professional for proper evaluation.</p>
                  <div className="flex gap-4 justify-center mt-8 flex-wrap">
                    <button onClick={handleSubmit} className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform cursor-pointer">
                      Submit & Chat with Seren →
                    </button>
                    <button onClick={handleRetake} className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all cursor-pointer">
                      Retake Test
                    </button>
                    <a href="/homepage" className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all no-underline">
                      Back to Dashboard
                    </a>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SoulSpacePHQ9));
    </script>
  </body>
</html>
