<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoulSpace PHQ-9</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='phq-9.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="background">
    <video class="background-video" autoplay muted loop>
      <source src="{{ url_for('static', filename='videos/phq-9.mp4') }}" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
    <div class="star"></div>
    <div class="star"></div>
    <div class="shooting-star"></div>
    <div class="constellation constellation-1"></div>
    <div class="constellation constellation-2"></div>
    <div class="constellation constellation-3"></div>
    <div class="gradient-star"></div>
  </div>

  <div class="floating-icons">
    <i class="fas fa-book-open icon-book"></i>
    <i class="fas fa-headphones-alt icon-headphones"></i>
    <i class="fas fa-pencil-alt icon-pencil"></i>
    <i class="fas fa-moon icon-moon"></i>
    <i class="fas fa-brain icon-brain"></i>
  </div>

  <form id="phq9Form" class="form-container" method="post">
    <div class="logo">
      <img src="{{ url_for('static', filename='images/phq-9.png') }}" alt="SoulSpace Logo" class="logo-icon" />
      <h1 class="logo-text">SoulSpace</h1>
      <p class="tagline">Find your place in the cosmos.</p>
    </div>

    <div class="progress-bar-container">
      <div id="phq9ProgressBar" class="progress-bar"></div>
    </div>
    <div id="phq9ProgressText" class="progress-text">1 / 9</div>

    <div id="phq9Stage" class="mbti-stage">
      <p id="phq9Question" class="question">Loading...</p>
      <div id="phq9Options" class="options-group phq9-options"></div>

      <div class="navigation-buttons">
        <button id="phq9PrevBtn" type="button" class="nav-button prev-button">Previous</button>
        <button id="phq9NextBtn" type="button" class="nav-button next-button">Next</button>
      </div>
    </div>

    <div id="phq9Result" class="results-container" hidden>
      <h2>PHQ-9 Score</h2>
      <div id="phq9TotalScore" class="type-badge"></div>
      <p id="phq9ScoreDesc" class="type-desc"></p>
      <div id="phq9Tips" class="chips-container"></div>

      <!-- Close button triggers AI reply only on main chat -->
      <button id="phq9CloseBtn" type="button" class="btn close-btn">Close & Submit</button>
 <button type="button" class="nav-button retake-button" onclick="retakeTest()">Retake Test</button>
    </div>

    <input type="hidden" name="answers" id="phq9AnswersField" value="" />
  </form>

  <script type="module" src="{{ url_for('static', filename='js/phq-9.js') }}"></script>
</body>
</html>
