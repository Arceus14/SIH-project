<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoulSpace — Login / Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      :root { --background: 201 100% 13%; --foreground: 0 0% 100%; --muted-foreground: 240 4% 66%; --border: 0 0% 18%; --input: 0 0% 18%; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      .liquid-glass { background: rgba(255,255,255,0.01); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
      .liquid-glass::before { content:''; position:absolute; inset:0; border-radius:inherit; padding:1.4px; background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
      @keyframes fade-rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
      .animate-fade-rise { animation:fade-rise 0.8s ease-out both; }
      *::-webkit-scrollbar { width:4px; } *::-webkit-scrollbar-track { background:transparent; } *::-webkit-scrollbar-thumb { background:hsl(var(--border)); border-radius:9999px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect } = React;

      function SoulSpaceLogin() {
        const [mode, setMode] = useState('login');
        const [key, setKey] = useState(0);
        const [error, setError] = useState('');
        const isLogin = mode === 'login';
        const toggleMode = () => { setMode(isLogin ? 'signup' : 'login'); setError(''); setKey(k => k+1); };

        useEffect(() => {
          if (typeof google !== 'undefined') {
            google.accounts.id.initialize({
              client_id: "956691593215-hv2vn0jm693gh4ddktdpi135o7jc2pof.apps.googleusercontent.com",
              callback: (response) => {
                fetch("/callback", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ credential: response.credential })
                })
                .then(res => res.json())
                .then(data => {
                  if (data.success) {
                    window.location.href = data.redirect;
                  } else {
                    alert("Login failed: " + data.error);
                  }
                })
                .catch(() => {
                  window.location.href = '/homepage';
                });
              }
            });
            const btnEl = document.getElementById("customGoogleBtn");
            if (btnEl) {
              google.accounts.id.renderButton(
                btnEl,
                { theme: "outline", size: "large", width: 300 }
              );
            }
          }
        }, [mode, key]);

        const handleSubmit = e => {
          e.preventDefault();
          setError('');
          const form = e.target;
          const fd = new FormData(form);
          fetch(isLogin ? '/login' : '/register', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
              if (data.success) {
                window.location.href = data.redirect;
              } else {
                setError(data.error);
              }
            })
            .catch(() => {
              setError("An unexpected error occurred. Please try again.");
            });
        };

        return (
          <div className="min-h-screen bg-[hsl(var(--background))] flex items-center justify-center px-4 relative overflow-hidden">
            <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover z-0 opacity-40 pointer-events-none">
              <source src="/static/videos/form.mp4" type="video/mp4" />
            </video>
            <nav className="absolute top-0 left-0 right-0 z-10 w-full">
              <div className="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
                <a href="/homepage" className="text-3xl tracking-tight no-underline text-white" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  SoulSpace <span className="text-xs align-super">✦</span>
                </a>
                <div className="hidden md:flex items-center gap-8">
                  <a href="/homepage" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Home</a>
                  <a href="/" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Seren</a>
                  <a href="/mbti" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Assessments</a>
                </div>
                <a href="/" className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform no-underline">Talk to Seren</a>
              </div>
            </nav>

            <div className="liquid-glass max-w-md w-full rounded-3xl p-10 animate-fade-rise" key={key}>
              <div className="text-center mb-6">
                <span className="text-2xl text-white" style={ { fontFamily: "'Instrument Serif', serif" } }>SoulSpace ✦</span>
              </div>
              <h2 className="text-3xl text-center font-normal" style={ { fontFamily: "'Instrument Serif', serif" } }>
                {isLogin ? 'Welcome back.' : 'Create your space.'}
              </h2>
              <p className="text-muted-foreground text-sm text-center mt-2 mb-8">
                {isLogin ? 'Sign in to continue with Seren.' : "Join SoulSpace. It's free and always here."}
              </p>

              <form className="flex flex-col gap-4" onSubmit={handleSubmit}>
                {error && (
                  <div className="bg-red-500/10 border border-red-500/20 text-red-200 rounded-xl p-3 text-xs text-center mb-2 animate-fade-rise">
                    {error}
                  </div>
                )}
                {!isLogin && (
                  <input name="name" placeholder="Full name" required
                    className="w-full bg-[hsl(var(--input))] border border-[hsl(var(--border))] rounded-xl px-4 py-3 text-sm text-white placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-white/20" />
                )}
                <input name="email" type="email" placeholder="Email address" required
                  className="w-full bg-[hsl(var(--input))] border border-[hsl(var(--border))] rounded-xl px-4 py-3 text-sm text-white placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-white/20" />
                <input name="password" type="password" placeholder="Password" required
                  className="w-full bg-[hsl(var(--input))] border border-[hsl(var(--border))] rounded-xl px-4 py-3 text-sm text-white placeholder:text-muted-foreground focus:outline-none focus:ring-1 focus:ring-white/20" />
                <button type="submit"
                  className="w-full liquid-glass rounded-xl py-3 text-sm text-white hover:scale-[1.03] transition-transform cursor-pointer mt-2">
                  {isLogin ? 'Sign In' : 'Create Account'}
                </button>
              </form>
              {isLogin && (
                <React.Fragment>
                  <div className="flex items-center gap-3 my-4">
                    <hr className="flex-1 border-white/10" />
                    <span className="text-xs text-muted-foreground">OR</span>
                    <hr className="flex-1 border-white/10" />
                  </div>
                  <div id="customGoogleBtn" className="flex justify-center w-full"></div>
                </React.Fragment>
              )}

              <p className="text-muted-foreground text-xs text-center mt-6">
                {isLogin ? "Don't have an account? " : 'Already have an account? '}
                <button onClick={toggleMode} className="text-white hover:underline bg-transparent border-none p-0 cursor-pointer text-xs">
                  {isLogin ? 'Sign up' : 'Sign in'}
                </button>
              </p>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SoulSpaceLogin));
    </script>
  </body>
</html>
