<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoulSpace — MBTI Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <style>
      :root { --background: 201 100% 13%; --foreground: 0 0% 100%; --muted-foreground: 240 4% 66%; --border: 0 0% 18%; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      .liquid-glass { background: rgba(255,255,255,0.01); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: none; box-shadow: inset 0 1px 1px rgba(255,255,255,0.1); position: relative; overflow: hidden; }
      .liquid-glass::before { content:''; position:absolute; inset:0; border-radius:inherit; padding:1.4px; background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%); -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
      .mbti-bg { position:absolute; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
      .mbti-bg::before,.mbti-bg::after { content:''; position:absolute; border-radius:50%; filter:blur(100px); opacity:0.04; animation:drift 20s ease-in-out infinite alternate; }
      .mbti-bg::before { width:80%; height:80%; background:radial-gradient(ellipse,rgba(120,80,255,1) 0%,transparent 70%); top:-20%; left:-20%; }
      .mbti-bg::after  { width:60%; height:60%; background:radial-gradient(ellipse,rgba(60,180,255,1) 0%,transparent 70%); bottom:-10%; right:-10%; animation-direction:alternate-reverse; }
      @keyframes drift { 0%{transform:translateX(0) translateY(0)} 100%{transform:translateX(5%) translateY(5%)} }
      @keyframes fade-rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
      .animate-fade-rise { animation:fade-rise 0.8s ease-out both; }
      *::-webkit-scrollbar { width:4px; } *::-webkit-scrollbar-track { background:transparent; } *::-webkit-scrollbar-thumb { background:hsl(var(--border)); border-radius:9999px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState } = React;

      const MBTI_QUESTIONS = [
        { question: 'You enjoy being the center of attention.', answerA: 'Agree (I like being the center of attention)', answerB: 'Disagree (I prefer to stay in the background)', dim: ['E', 'I'] },
        { question: 'You are energized by social gatherings.', answerA: 'Agree (Social gatherings energize me)', answerB: 'Disagree (Social gatherings drain my energy)', dim: ['E', 'I'] },
        { question: 'You find it easy to approach and talk to new people.', answerA: 'Agree (I easily approach new people)', answerB: 'Disagree (I find it hard to start conversations)', dim: ['E', 'I'] },
        { question: 'After a busy day, you prefer to recharge alone rather than with others.', answerA: 'Agree (I recharge by spending quiet time alone)', answerB: 'Disagree (I recharge by socializing with others)', dim: ['I', 'E'] },
        
        { question: 'You rely more on facts and past experience than theories.', answerA: 'Agree (I value practical facts and experience)', answerB: 'Disagree (I value speculative theories and concepts)', dim: ['S', 'N'] },
        { question: 'You prefer practical tasks over exploring abstract possibilities.', answerA: 'Agree (I prefer hands-on, practical tasks)', answerB: 'Disagree (I prefer exploring abstract possibilities)', dim: ['S', 'N'] },
        { question: 'You focus more on present details than future possibilities.', answerA: 'Agree (I focus on details in the present moment)', answerB: 'Disagree (I focus on long-term future visions)', dim: ['S', 'N'] },
        { question: 'You enjoy imagining what could be rather than what is.', answerA: 'Agree (I love imagining potential possibilities)', answerB: 'Disagree (I stick to what is actual and real)', dim: ['N', 'S'] },
        
        { question: 'You make decisions using logic and consistency over empathy.', answerA: 'Agree (I use logic and objective consistency)', answerB: 'Disagree (I prioritize empathy and personal values)', dim: ['T', 'F'] },
        { question: 'You value fairness and principles over personal circumstances.', answerA: 'Agree (I prioritize fairness and objective rules)', answerB: 'Disagree (I prioritize specific personal circumstances)', dim: ['T', 'F'] },
        { question: 'You prioritize harmony and people’s feelings in decisions.', answerA: 'Agree (I focus on harmony and emotional impacts)', answerB: 'Disagree (I focus on logical soundness and truth)', dim: ['F', 'T'] },
        { question: 'You tend to consider the human impact before the numbers.', answerA: 'Agree (I look at human feelings first)', answerB: 'Disagree (I look at logic and statistics first)', dim: ['F', 'T'] },
        
        { question: 'You prefer a structured plan over going with the flow.', answerA: 'Agree (I prefer a clear, organized schedule)', answerB: 'Disagree (I prefer leaving things open-ended)', dim: ['J', 'P'] },
        { question: 'You like closing tasks early rather than keeping options open.', answerA: 'Agree (I like deciding and completing things early)', answerB: 'Disagree (I prefer keeping my options open)', dim: ['J', 'P'] },
        { question: 'You are flexible and comfortable adapting plans last minute.', answerA: 'Agree (I adapt plans easily and on the fly)', answerB: 'Disagree (I prefer stuck plans and predictability)', dim: ['P', 'J'] },
        { question: 'You feel best when your schedule is organized and decided.', answerA: 'Agree (I feel calm when my schedule is pre-arranged)', answerB: 'Disagree (I feel restricted when everything is scheduled)', dim: ['J', 'P'] }
      ];

      const TYPE_DETAILS = {
        ISTJ: { name: "Logistician", desc: "Responsible, detail-focused, and reliable. Prefers structure and clear expectations.", tips: ["Use checklists and timelines.", "Break tasks into well-defined steps.", "Study in quiet, predictable spaces."] },
        ISFJ: { name: "Defender", desc: "Supportive, observant, and patient. Motivated by helping and duty.", tips: ["Create gentle routines and reward milestones.", "Study with purpose—link tasks to people helped.", "Use tidy, calm environments."] },
        INFJ: { name: "Advocate", desc: "Insightful, idealistic, and purpose-driven. Seeks meaning and depth.", tips: ["Tie study goals to your values.", "Alternate deep work with reflective breaks.", "Summarize concepts in your own words."] },
        INTJ: { name: "Architect", desc: "Strategic, independent, and future-focused. Loves systems and mastery.", tips: ["Plan backwards from outcomes.", "Use spaced repetition and concept maps.", "Protect long, interruption-free blocks."] },
        ISTP: { name: "Virtuoso", desc: "Hands-on, analytical, and adaptable. Learns best by doing.", tips: ["Apply theory to mini-projects.", "Use short, intense sprints.", "Keep tools and examples nearby."] },
        ISFP: { name: "Adventurer", desc: "Sensitive, creative, and spontaneous. Values authenticity and experience.", tips: ["Make study visually engaging.", "Use short sessions with variety.", "Link topics to real-life interests."] },
        INFP: { name: "Mediator", desc: "Imaginative, empathetic, and values-driven. Motivated by meaning.", tips: ["Set heartfelt reasons for each goal.", "Journal brief reflections after sessions.", "Use gentle structure with flexibility."] },
        INTP: { name: "Logician", desc: "Curious, theoretical, and independent. Loves patterns and puzzles.", tips: ["Teach concepts to an imaginary class.", "Use whiteboards and mind maps.", "Schedule breaks to avoid rabbit holes."] },
        ESTP: { name: "Entrepreneur", desc: "Energetic, pragmatic, and action-oriented. Thrives on real results.", tips: ["Turn studying into challenges or timers.", "Use practical examples and case studies.", "Move between tasks to stay engaged."] },
        ESFP: { name: "Entertainer", desc: "Outgoing, warm, and present-focused. Enjoys social learning.", tips: ["Study with peers; discuss out loud.", "Use colorful, interactive materials.", "Reward progress with short fun breaks."] },
        ENFP: { name: "Campaigner", desc: "Enthusiastic, imaginative, and people-centered. Loves possibilities.", tips: ["Capture ideas; then choose one path.", "Use variety but limit task switching.", "Anchor sessions with a simple plan."] },
        ENTP: { name: "Debater", desc: "Inventive, quick, and loves to challenge ideas.", tips: ["Debate topics or play devil's advocate.", "Prototype ideas quickly.", "Time-box exploration to ship results."] },
        ESTJ: { name: "Executive", desc: "Organized, direct, and practical. Values efficiency and standards.", tips: ["Set measurable targets per session.", "Use calendars and checklists.", "Review outcomes weekly."] },
        ESFJ: { name: "Consul", desc: "Caring, cooperative, and dependable. Team-oriented and structured.", tips: ["Study with accountability partners.", "Use clear schedules and shared goals.", "Teach others to reinforce learning."] },
        ENFJ: { name: "Protagonist", desc: "Encouraging, organized, and inspiring. Leads with vision and care.", tips: ["Set meaningful goals tied to impact.", "Mix solo focus with guided group sessions.", "Reflect on progress to stay aligned."] },
        ENTJ: { name: "Commander", desc: "Strategic, decisive, and goal-driven. Thrives on challenge.", tips: ["Plan objectives and KPIs for study.", "Tackle hardest tasks first.", "Delegate or automate low-value work."] }
      };

      function calculateMBTI(answers) {
        let score = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        answers.forEach((ans, idx) => {
          if (ans === -1) return;
          const dims = MBTI_QUESTIONS[idx].dim;
          const chosen = ans === 0 ? dims[0] : dims[1];
          score[chosen]++;
        });
        let type = '';
        type += (score.E >= score.I) ? 'E' : 'I';
        type += (score.S >= score.N) ? 'S' : 'N';
        type += (score.T >= score.F) ? 'T' : 'F';
        type += (score.J >= score.P) ? 'J' : 'P';
        return type;
      }

      function SoulSpaceMBTI() {
        const [current, setCurrent] = useState(0);
        const [answers, setAnswers] = useState(Array(16).fill(-1));
        const [showResults, setShowResults] = useState(false);
        const result = calculateMBTI(answers);
        const profile = TYPE_DETAILS[result] || { name: 'Your Type', desc: 'A balanced mix of preferences.', tips: [] };
        const selectOption = choice => { const next=[...answers]; next[current]=choice; setAnswers(next); };
        const goNext = () => { if(current<15) setCurrent(p=>p+1); else setShowResults(true); };
        const goPrev = () => { if(current>0) setCurrent(p=>p-1); };
        const handleRetake = () => { setCurrent(0); setAnswers(Array(16).fill(-1)); setShowResults(false); };
        const handleSubmit = () => {
          const form = document.createElement('form');
          form.method='POST'; form.action='/submit_mbti';
          const t = document.createElement('input'); t.type='hidden'; t.name='mbti_type'; t.value=result;
          form.appendChild(t); document.body.appendChild(form); form.submit();
        };

        return (
          <div className="relative min-h-screen bg-[hsl(var(--background))] flex flex-col overflow-hidden">
            <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover z-0 opacity-40 pointer-events-none">
              <source src="/static/videos/mbti.mp4" type="video/mp4" />
            </video>
            <div className="mbti-bg" />
            <nav className="relative z-10 w-full">
              <div className="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">
                <a href="/homepage" className="text-3xl tracking-tight no-underline text-white" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  SoulSpace <span className="text-xs align-super">✦</span>
                </a>
                <div className="hidden md:flex items-center gap-8">
                  <a href="/homepage" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Home</a>
                  <a href="/" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Seren</a>
                  <a href="/mbti" className="text-sm text-white no-underline">Assessments</a>
                  <a href="/logout" className="text-sm text-muted-foreground hover:text-white transition-colors no-underline">Logout</a>
                </div>
                <a href="/" className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform no-underline">Talk to Seren</a>
              </div>
            </nav>

            {!showResults ? (
              <div className="flex-1 max-w-2xl mx-auto px-6 py-20 w-full relative z-10">
                <div className="h-[2px] bg-white/10 rounded mb-2">
                  <div className="h-full bg-white/50 rounded transition-all duration-500" style={ { width: `${((current+1)/16)*100}%` } } />
                </div>
                <p className="text-xs text-muted-foreground mb-8">{current+1} of 16</p>
                <span className="liquid-glass rounded-full px-4 py-1 text-xs text-muted-foreground mb-6 inline-block">MBTI Personality Assessment</span>
                <h2 className="animate-fade-rise text-2xl sm:text-3xl font-normal mt-2 mb-8" style={ { fontFamily: "'Instrument Serif', serif" } }>
                  {MBTI_QUESTIONS[current].question}
                </h2>
                <div className="flex flex-col gap-3">
                  <button onClick={() => selectOption(0)}
                    className={`liquid-glass rounded-xl px-6 py-4 text-sm text-white cursor-pointer text-left transition-all hover:bg-white/5 ${answers[current]===0?'border border-white/30 bg-white/5':''}`}>
                    {MBTI_QUESTIONS[current].answerA}
                  </button>
                  <button onClick={() => selectOption(1)}
                    className={`liquid-glass rounded-xl px-6 py-4 text-sm text-white cursor-pointer text-left transition-all hover:bg-white/5 ${answers[current]===1?'border border-white/30 bg-white/5':''}`}>
                    {MBTI_QUESTIONS[current].answerB}
                  </button>
                </div>
                <div className="flex justify-between mt-10">
                  <button onClick={goPrev} className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all cursor-pointer">← Previous</button>
                  <button onClick={goNext} disabled={answers[current]===-1} className="liquid-glass rounded-full px-8 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform cursor-pointer disabled:opacity-40 disabled:pointer-events-none">
                    {current < 15 ? 'Next →' : 'See Results →'}
                  </button>
                </div>
              </div>
            ) : (
              <div className="flex-1 flex items-center justify-center px-6 py-20 relative z-10">
                <div className="liquid-glass rounded-2xl p-10 text-center max-w-lg w-full animate-fade-rise">
                  <span className="liquid-glass rounded-full px-6 py-2 text-2xl font-medium mb-4 inline-block tracking-widest">{result}</span>
                  <h2 className="text-3xl font-normal mb-4" style={ { fontFamily: "'Instrument Serif', serif" } }>
                    {profile.name}
                  </h2>
                  <p className="text-muted-foreground text-sm leading-relaxed">{profile.desc}</p>
                  
                  <div className="text-left mt-6 border-t border-white/10 pt-4">
                    <h4 className="text-sm font-semibold text-white mb-2">Tips for Studying:</h4>
                    <ul className="list-disc pl-5 text-xs text-muted-foreground space-y-1.5">
                      {profile.tips.map((tip, idx) => (
                        <li key={idx}>{tip}</li>
                      ))}
                    </ul>
                  </div>

                  <p className="text-xs text-muted-foreground mt-6">This is not a clinical assessment. MBTI is a personality framework, not a diagnostic tool.</p>
                  <div className="flex gap-4 justify-center mt-8 flex-wrap">
                    <button onClick={handleSubmit} className="liquid-glass rounded-full px-6 py-2.5 text-sm text-white hover:scale-[1.03] transition-transform cursor-pointer">
                      Submit & Chat with Seren →
                    </button>
                    <button onClick={handleRetake} className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all cursor-pointer">
                      Retake Test
                    </button>
                    <a href="/homepage" className="border border-[hsl(var(--border))] rounded-full px-6 py-2.5 text-sm text-muted-foreground hover:text-white hover:border-white/30 transition-all no-underline">
                      Back to Dashboard
                    </a>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(SoulSpaceMBTI));
    </script>
  </body>
</html>
